<!DOCTYPE html>
<html>
  <head>
    <!-- КРИТИЧЕСКИ ВАЖНО: Разрешаем телефону масштабировать AR-сцену на весь экран -->
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <!-- Подключаем сверхстабильные официальные CDN, одобренные Google и Apple -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
  </head>
  
  <!-- Убираем отступы, чтобы предотвратить баг белого экрана -->
  <body style="margin: 0px; overflow: hidden;">

    <!-- Инициализируем сцену строго в режиме отслеживания камеры -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Отслеживаем стандартный маркер Hiro -->
      <a-marker preset="hiro">
        <!-- Показываем синий 3D-куб, который плавно крутится -->
        <a-box position="0 0.5 0" 
               material="color: #0077ff; opacity: 0.9;" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>
      </a-marker>

      <!-- Добавляем виртуальную камеру сцены -->
      
      
    </a-scene>
  </body>
</html>
