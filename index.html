<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR in Web</title>
    <!-- Подключение стабильной версии A-Frame -->
    <script src="https://aframe.io"></script>
    <!-- Подключение официального стабильного AR.js для A-Frame -->
    <script src="https://githack.com"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- Настройка сцены: отключена UI-кнопка VR и включен модуль AR.js с веб-камерой -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false;">
        
        <!-- Маркер Hiro (стандартный шаблон) -->
        <a-marker preset="hiro">
            
            <!-- Синий анимированный куб -->
            <a-box position="0 0.5 0" 
                   scale="0.5 0.5 0.5" 
                   material="color: #0077ff;" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
            </a-box>

        </a-marker>
        
        <!-- Добавлена виртуальная камера для связи координат 3D-мира и маркера -->
        
        
    </a-scene>

</body>
</html>
