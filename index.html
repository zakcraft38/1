<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR in Web</title>
    <!-- Подключаем стабильный A-Frame -->
    <script src="https://cloudflare.com"></script>
    <!-- ИСПРАВЛЕНО: Правильная ссылка на AR.js (добавлен дефис AR-js-org) -->
    <script src="https://githack.com"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- Инициализируем AR сцену без лишних дебаг-панелей -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Реагирует на стандартную картинку Hiro -->
        <a-marker preset="hiro">
            
            <!-- ВРЕМЕННО ДЛЯ ТЕСТА: Показываем яркий синий куб нормального размера -->
             -->
            <a-box position="0 0.5 0" 
                   scale="0.5 0.5 0.5" 
                   material="color: #0077ff;" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
            </a-box>

        </a-marker>
        
        
    </a-scene>

</body>
</html>
