<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>AR in Web</title>
    <!-- Скрипты ДОЛЖНЫ быть здесь (в head), чтобы сцена загружалась правильно -->
    <script src="https://aframe.io"></script>
    <script src="https://raw.githack.com/AR-jsorg/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <!-- Добавлены параметры sourceType и debugUIEnabled для стабильной работы камеры -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- Добавлено базовое освещение, иначе модель будет полностью черной -->
        
        

        <!-- Ошибка исправлена: украинский комментарий вынесен за пределы тега -->
        <!-- За допомогою preset воно реагує на картинку -->
        <a-marker preset="hiro">
            
            
        </a-marker>
        
        
    </a-scene>
</body>
</html>
