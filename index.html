<!DOCTYPE html>
<html lang="ru">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR in Web</title>
</head>
<body>

scale="1 1 1"

></a-entity>
<a-entity
position="0 0 0"
scale="1 1 1"
gltf-model="obj/3d_demo_4.gltf"
    <a-box position="0 0.5 0" material="color: red;"></a-box>
></a-entity>
    <a-box position="0 0.5 0" material="color: red;"></a-box>
</a-marker>

</a-scene>

</html>
