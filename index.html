<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Task</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        /* Создаем виртуальный куб, который будет висеть по центру экрана поверх камеры */
        .ar-cube {
            position: absolute; top: 50%; left: 50%; width: 120px; height: 120px;
            margin-left: -60px; margin-top: -60px; background: #0077ff; opacity: 0.9;
            box-shadow: 0 0 20px rgba(0,119,255,0.6); border: 2px solid white;
            z-index: 2; pointer-events: none; display: none;
            animation: spin 3s linear infinite;
        }
        @keyframes spin { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } }
    </style>
</head>
<body>

    <!-- Элемент стандартной камеры смартфона -->
    <video id="webcam" autoplay playsinline></video>
    
    <!-- Наш синий куб -->
    <div id="cube" class="ar-cube"></div>

    <script>
        const video = document.getElementById('webcam');
        const cube = document.getElementById('cube');

        // Чистый запрос к камере без тяжелых AR библиотек
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => {
                video.srcObject = stream;
                // Как только камера включилась, активируем куб
                cube.style.display = 'block';
            })
            .catch(err => {
                alert("Ошибка камеры: " + err);
            });
    </script>
</body>
</html>
