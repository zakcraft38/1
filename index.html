<!DOCTYPE html>
<html>
<head>
  <title>Test AR #3</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.rawgit.com/jeromeetienne/AR.js/2.1.7/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <!-- Marker for tracking -->
    <a-marker type="pattern" url="/1/pattern-hiro.patt">
      <!-- Plane to display the image -->
      <a-box position="0 0.5 0" material="color: red;"></a-box>
      <a-entity
        position="0 0 0"
        scale="1 1 1"
        gltf-model="/1/demo.glb"
      ></a-entity>
    </a-marker>
    <!-- Camera to view the scene -->
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
