<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <!-- Используем чистый A-Frame новейшей версии, телефон её полностью одобряет -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">

    <!-- Запускаем WebXR сцену дополненной реальности (режим ar) -->
    <a-scene xr-mode-ui="XRMode: ar">
      
      <!-- Создаем обычный 3D-куб прямо перед виртуальной камерой -->
      <a-box position="0 0 -1.5" 
             scale="0.3 0.3 0.3" 
             material="color: #0077ff;" 
             animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-box>

      
    </a-scene>

  </body>
</html>
