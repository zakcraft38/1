<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR in Web</title>
    <!-- ДОБАВЛЕНО: Стабильный A-Frame -->
    <script src="https://cloudflare.com"></script>
    <!-- ДОБАВЛЕНО: Официальный стабильный AR.js без опечаток -->
    <script src="https://cloudflare.com"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

    <!-- ДОБАВЛЕНО: vr-mode-ui="enabled: false" принудительно отключает кнопки AR/VR, ломающие маркеры -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false;">
        
        <!-- Реагирует на стандартную картинку Hiro -->
        <a-marker preset="hiro">
            
            <!-- Показываем яркий синий куб нормального размера -->
            <a-box position="0 0.5 0" 
                   scale="0.5 0.5 0.5" 
                   material="color: #0077ff;" 
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
            </a-box>

        </a-marker>
        
        <!-- ДОБАВЛЕНО: Виртуальная камера для отрисовки 3D поверх реального мира -->
        
        
    </a-scene>

</body>
</html>
